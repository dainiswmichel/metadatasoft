<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Audio File Tagger - MFCG-07</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Include xterm and custom CSS -->
  <link rel="stylesheet" href="https://unpkg.com/xterm/css/xterm.css" />
  <link rel="stylesheet" href="mfcg-07.css">
  <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.7/dist/ffmpeg.min.js"></script>
</head>
<body>
  <div class="container">
    <h1>Audio File Tagger - MFCG-07</h1>

    <!-- Step 1: Input Files -->
    <div class="section">
      <h2>1. Select Input Files</h2>
      <div class="form-group">
        <label for="input-file">Select Audio File:</label>
        <input type="file" id="input-file" accept="audio/*">
      </div>
      <div class="form-group">
        <label for="cover-art">Select Cover Art (Optional - Only works for MP3):</label>
        <input type="file" id="cover-art" accept="image/*">
      </div>
    </div>

    <!-- Step 2: Metadata -->
    <div class="section">
      <h2>2. Enter Metadata</h2>
      <div class="form-group">
        <label for="title">Title:</label>
        <input type="text" id="title" placeholder="Enter title">
      </div>
      <div class="form-group">
        <label for="artist">Artist:</label>
        <input type="text" id="artist" placeholder="Enter artist">
      </div>
      <div class="form-group">
        <label for="album">Album:</label>
        <input type="text" id="album" placeholder="Enter album">
      </div>
      <div class="form-group">
        <label for="genre">Genre:</label>
        <input type="text" id="genre" placeholder="Enter genre">
      </div>
    </div>

    <!-- Step 3: Output Options and Command Preview -->
    <div class="section">
      <h2>3. Output Options</h2>
      <div class="form-group">
        <label for="output_filename">Output Filename (without extension):</label>
        <input type="text" id="output_filename" placeholder="e.g., my_tagged_song">
      </div>
      <div class="form-group">
        <label>Output Format:</label>
        <div class="radio-group">
          <label><input type="radio" name="format" value="wav"> WAV</label>
          <label><input type="radio" name="format" value="mp3" checked> MP3</label>
          <label><input type="radio" name="format" value="flac"> FLAC</label>
          <label><input type="radio" name="format" value="m4a"> M4A</label>
        </div>
      </div>
      <button onclick="generateCommand()">Generate Command</button>
      <button onclick="copyCommand()">Copy Command</button>
      <button onclick="runCommand()">Run Command</button>
      <h3>Command Preview:</h3>
      <textarea id="commandPreview" readonly style="width:100%; height:80px;"></textarea>
    </div>

    <!-- Step 4: Terminal Output -->
    <div class="section">
      <h2>Terminal Output</h2>
      <div id="terminal"></div>
    </div>
  </div>

  <script src="https://unpkg.com/xterm/lib/xterm.js"></script>
  <script src="mfcg-07.js"></script>
</body>
</html>
