<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio File Tagger - MFCG-14</title>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.7/dist/ffmpeg.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/xterm/css/xterm.css" />
    <link rel="stylesheet" href="mfcg-14.css">
    <script src="https://unpkg.com/xterm/lib/xterm.js"></script>
</head>
<body>
    <div class="container">
        <h1>Audio File Tagger - MFCG-14</h1>

        <!-- Step 1: File Selection -->
        <div class="section">
            <h2>1. Select Input File</h2>
            <input type="file" id="input-file" accept="audio/*">
        </div>

        <!-- Step 2: Cover Art Selection -->
        <div class="section">
            <h2>2. Select Cover Art (Optional)</h2>
            <input type="file" id="cover-art" accept="image/*">
        </div>

        <!-- Step 3: Metadata -->
        <div class="section">
            <h2>3. Enter Metadata</h2>
            <div class="form-group">
                <label for="title">Title:</label>
                <input type="text" id="title">
            </div>
            <div class="form-group">
                <label for="artist">Artist:</label>
                <input type="text" id="artist">
            </div>
            <div class="form-group">
                <label for="album">Album:</label>
                <input type="text" id="album">
            </div>
            <div class="form-group">
                <label for="genre">Genre:</label>
                <input type="text" id="genre">
            </div>
        </div>

        <!-- Step 4: Output Options -->
        <div class="section">
            <h2>4. Output Options</h2>
            <div class="form-group">
                <label for="output_filename">Output Filename (without extension):</label>
                <input type="text" id="output_filename" placeholder="e.g., my_tagged_song">
            </div>
            <div class="form-group">
                <label>Output Format:</label>
                <div class="radio-group">
                    <label><input type="radio" name="format" value="bwf"> BWF</label>
                    <label><input type="radio" name="format" value="mp3" checked> MP3</label>
                    <label><input type="radio" name="format" value="flac"> FLAC</label>
                    <label><input type="radio" name="format" value="m4a"> M4A</label>
                </div>
            </div>
            <button onclick="generateCommand()">Generate Command</button>
            <button onclick="copyCommand()">Copy Command</button>
            <button onclick="runCommand()">Run Command</button>
            <button onclick="embedUsingFFmpeg()">Embed using FFmpeg.wasm</button>
            <h3>Command Preview:</h3>
            <textarea id="commandPreview" readonly style="width:100%; height:80px;"></textarea>
        </div>

        <!-- Terminal Output -->
        <div class="section">
            <h2>Terminal Output</h2>
            <div id="terminal"></div>
        </div>
    </div>

    <script src="mfcg-14.js"></script>
</body>
</html>
