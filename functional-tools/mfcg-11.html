<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FFmpeg Metadata Tagger - Iteration 11</title>
  <!-- Using the styling from iteration 08 -->
  <link rel="stylesheet" href="mfcg-08.css">
  <!-- Xterm CSS -->
  <link rel="stylesheet" href="https://unpkg.com/xterm/css/xterm.css" />
</head>
<body>
  <div class="container">
    <h1>Audio File Tagger</h1>
    
    <!-- Section 1: File Selection -->
    <div class="section">
      <h2>1. Select Input Files</h2>
      <div class="form-group">
        <label for="input-file">Audio File:</label>
        <input type="file" id="input-file" accept="audio/*">
      </div>
      <div class="form-group">
        <label for="cover-art">Cover Art (Optional – for MP3 only):</label>
        <input type="file" id="cover-art" accept="image/*">
      </div>
    </div>
    
    <!-- Section 2: Metadata Input -->
    <div class="section">
      <h2>2. Enter Metadata</h2>
      <div class="form-group">
        <label for="title">Title:</label>
        <input type="text" id="title" placeholder="Song Title">
      </div>
      <div class="form-group">
        <label for="artist">Artist:</label>
        <input type="text" id="artist" placeholder="Artist Name">
      </div>
      <div class="form-group">
        <label for="album">Album:</label>
        <input type="text" id="album" placeholder="Album Name">
      </div>
      <div class="form-group">
        <label for="genre">Genre:</label>
        <input type="text" id="genre" placeholder="Genre">
      </div>
      <div class="form-group">
        <label for="release_date">Release Date:</label>
        <input type="date" id="release_date">
      </div>
      <div class="form-group">
        <label for="track_number">Track Number:</label>
        <input type="number" id="track_number">
      </div>
      <div class="form-group">
        <label for="disc_number">Disc Number:</label>
        <input type="number" id="disc_number">
      </div>
      <div class="form-group">
        <label for="isrc">ISRC:</label>
        <input type="text" id="isrc">
      </div>
      <div class="form-group">
        <label for="copyright">Copyright:</label>
        <input type="text" id="copyright">
      </div>
      <div class="form-group">
        <label for="language">Language:</label>
        <input type="text" id="language">
      </div>
      <!-- Additional metadata fields as needed -->
    </div>
    
    <!-- Section 3: Output Options -->
    <div class="section">
      <h2>3. Output Options</h2>
      <div class="form-group">
        <label for="output_filename">Output Filename (without extension):</label>
        <input type="text" id="output_filename" placeholder="e.g., my_tagged_song">
      </div>
      <div class="form-group">
        <label>Output Format:</label>
        <div class="radio-group">
          <label><input type="radio" name="format" value="wav"> WAV</label>
          <label><input type="radio" name="format" value="mp3" checked> MP3</label>
          <label><input type="radio" name="format" value="flac"> FLAC</label>
          <label><input type="radio" name="format" value="m4a"> M4A</label>
        </div>
      </div>
      <button id="process-btn" onclick="processFile()">Process File</button>
    </div>
    
    <!-- Section 4: Terminal Output -->
    <div class="section">
      <h2>Terminal Output</h2>
      <div id="terminal"></div>
    </div>
  </div>
  
  <!-- Include Xterm.js -->
  <script src="https://unpkg.com/xterm/lib/xterm.js"></script>
  <!-- Include our iteration 11 JavaScript -->
  <script src="mfcg-11.js"></script>
</body>
</html>
